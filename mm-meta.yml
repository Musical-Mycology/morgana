schema_version: 2
slug: morgana
display_name: Morgana

description: >
  Self-hostable web editor for cinematic, data-driven slide decks. Decks are
  authored as Scene → Beat → Action JSON and played by a vendored GSAP +
  tsParticles engine; the editor adds a filmstrip, WYSIWYG canvas,
  schema-driven inspector, and scrubbable per-beat timeline on top of that
  same data model. Runs as a single Node container with filesystem storage —
  no database, no infrastructure-specific coupling.

tech: [nextjs, typescript, gsap, tsparticles, docker]

notes:
  - Standalone, easy-to-deploy OSS tool — intentionally no Mycelium-specific coupling.

